name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    name: Check flake
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v4

      - name: Check flake
        run: nix flake check

  build:
    name: Build and test
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v4

      - name: Build package
        run: nix build .#substreams --print-build-logs

      - name: Test version
        run: |
          ./result/bin/substreams --version

      - name: Test help
        run: |
          ./result/bin/substreams --help
