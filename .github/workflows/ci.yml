name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  check:
    name: Check flake
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22

      - name: Check flake
        run: nix flake check

  build:
    name: Build and test
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        package:
          - substreams
          - substreams-sink-sql
          - substreams-sink-files
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22

      - name: Build package
        run: nix build .#${{ matrix.package }} --print-build-logs

      - name: Test version
        run: |
          ./result/bin/${{ matrix.package }} --version
