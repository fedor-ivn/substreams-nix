name: Update Substreams

on:
  schedule:
    # Run daily at 03:00 UTC
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22

      - name: Update with nix-update
        id: update
        run: |
          for package in substreams substreams-sink-sql substreams-sink-files; do
            nix run github:Mic92/nix-update -- \
              --flake "$package" \
              --format \
              --commit
          done

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8
        with:
          # Use a PAT/App token (not the default GITHUB_TOKEN) so that opening
          # the PR triggers CI. See:
          # https://github.com/peter-evans/create-pull-request/blob/main/docs/concepts-guidelines.md
          token: ${{ secrets.GH_PAT }}
          commit-message: 'chore: update substreams packages'
          title: 'chore: update substreams packages'
          body: |
            Auto-generated update for Substreams packages
            (substreams, substreams-sink-sql, substreams-sink-files).

            Updated by [nix-update](https://github.com/Mic92/nix-update).
          branch: auto-update/substreams
          delete-branch: true
          labels: dependencies
