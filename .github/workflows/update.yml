name: Update Substreams

on:
  schedule:
    # Run daily at 03:00 UTC
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v4

      - name: Update with nix-update
        id: update
        run: |
          nix run github:Mic92/nix-update -- \
            --flake substreams \
            --format \
            --commit

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: 'chore: update substreams'
          title: 'chore: update substreams'
          body: |
            Auto-generated update for Substreams CLI.

            Updated by [nix-update](https://github.com/Mic92/nix-update).
          branch: auto-update/substreams
          delete-branch: true
          labels: dependencies
